<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

  <title>Q4 Practice 4</title>
</head>
<body>
  

  <form>
    <h2>Login Form</h2>
    <label for="user">Username</label>
        <br>
        <input type="text" id="user" class="form-control" placeholder="Enter here" required>
        <br>

    <label for="pass">Password</label>
        <br>
        <input type="password" id="pass" class="form-control" placeholder="Enter here" required>
        <br>

    <input type="button" name="button" id="loginBTN" value="Login" class="btn btn-alert rounded-5" onclick="authenticate()">
    <input type="reset" name="button" id="cancel" value="Cancel" class="btn btn-alert rounded-5">

    <p id="display"></p>

  </form>

  <script>
      let attempt_counter = 0;

      function authenticate(){
        let username = document.getElementById("user").value;
            let pwd = document.getElementById("pass").value;
            let granted = "Welcome " + username + "!";
            let denied = "Access denied. Account locked after 3 attempts!";

        while (attempt_counter < 3) 
          if (username === "lashesrmyforte" && pwd === "hiimissyoumost04") {
            alert(granted);
            attempt_counter = 0; // reset attempts after successful login
            document.getElementById("display").innerHTML = "";
            window.location.href = "index.html";

            break; // stop loop
        
      }   else { 
            attempt_counter++;
            document.getElementbyId("display").innerHTML = "Incorrect username and/or password. Attempt" + attempt_counter + " of 3 "

            break; //stop loop for this click

     }
  }
  if (attempt_counter >= 3) {
          alert(denied);
          document.getElementById("loginBTN").disabled = true; //disable button
  }

       
  </script>


</body>
</html>
